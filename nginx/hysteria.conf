# Nginx configuration for hysteria
# File ini diletakkan di: /etc/nginx/sites-available/hysteria
# Lalu symlink ke: /etc/nginx/sites-enabled/hysteria

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP ke HTTPS (aktifkan setelah SSL dikonfigurasi)
    # return 301 https://$host$request_uri;

    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/css application/javascript image/svg+xml;

    # Next.js static files (cache agresif)
    location /_next/static {
        alias /var/www/hysteria/.next/standalone/.next/static;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Public uploads (gambar, video)
    location /uploads {
        alias /var/www/hysteria/public/uploads;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Public static assets (icons, images, svg)
    location /icons {
        alias /var/www/hysteria/public/icons;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location /image {
        alias /var/www/hysteria/public/image;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location /svg {
        alias /var/www/hysteria/public/svg;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Proxy ke Next.js app
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}

